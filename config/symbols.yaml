# 交易对详细配置
# 格式: 交易对 -> 配置

BTCUSDT:
  # 基础信息
  base_asset: BTC
  quote_asset: USDT
  # 交易参数
  min_notional: 10.0  # 最小交易额 (USDT)
  min_quantity: 0.00001  # 最小数量
  step_size: 0.00001  # 数量步长
  tick_size: 0.01  # 价格步长
  # 风控参数
  max_position_ratio: 0.3  # 最大仓位比例 (30%)
  volatility_multiplier: 1.0  # 波动率乘数
  # 信号权重
  signal_weight: 1.0

ETHUSDT:
  base_asset: ETH
  quote_asset: USDT
  min_notional: 10.0
  min_quantity: 0.0001
  step_size: 0.0001
  tick_size: 0.01
  max_position_ratio: 0.3
  volatility_multiplier: 1.2
  signal_weight: 0.8

BNBUSDT:
  base_asset: BNB
  quote_asset: USDT
  min_notional: 10.0
  min_quantity: 0.001
  step_size: 0.001
  tick_size: 0.001
  max_position_ratio: 0.2
  volatility_multiplier: 1.5
  signal_weight: 0.6

# 其他交易对模板
# SYMBOL:
#   base_asset: 
